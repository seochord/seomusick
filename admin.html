<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>관리자 — SEO MUSICK</title>
<link href="https://fonts.googleapis.com/css2?family=Alice&family=Lora:ital,wght@0,400;0,500;0,600;1,400&family=Montserrat:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #f8fafc;
  --sw: 240px;
  --cream: #1e293b;
  --gold: #335c81;
  --muted: #64748b;
  --border: rgba(51, 92, 129, 0.12);
  
  --f-head: 'Alice', serif;
  --f-body: 'Lora', serif;
  --f-ui: 'Montserrat', sans-serif;
}
* { box-sizing: border-box; }
body { background:var(--bg); color:var(--cream); font-family:var(--f-body); margin:0; display:flex; height:100vh; overflow:hidden; }

/* SIDEBAR */
.sidebar {
  width:var(--sw); background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:40px 24px;
}
.s-logo {
  font-family:var(--f-head); font-size:22px; font-weight:400;
  letter-spacing:0.1em; color:var(--gold); margin-bottom:40px; text-decoration:none;
}
.s-nav { list-style:none; padding:0; margin:0; }
.s-nav li { margin-bottom:10px; }
.s-nav a {
  display:block; font-family:var(--f-ui); font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted); text-decoration:none; padding:12px 18px; border-radius:8px;
  transition: all 0.3s; cursor:pointer; font-weight:500;
}
.s-nav a:hover { background: rgba(51, 92, 129, 0.05); color:var(--gold); }
.s-nav a.active { background:var(--gold); color:var(--bg); }

/* MAIN CONTENT */
.main { flex:1; padding:60px 80px; overflow-y:auto; }
h1 { color:var(--gold); letter-spacing:0.02em; font-size:28px; margin-bottom:40px; font-family:var(--f-head); font-weight:400; }
h2 { color:var(--gold); font-size:14px; margin-top:0; margin-bottom:30px; border-bottom:1px solid var(--border); padding-bottom:12px; text-transform:uppercase; letter-spacing:0.15em; font-family:var(--f-ui); font-weight:600; }

.form-group { margin-bottom:24px; }
label { display:block; font-family:var(--f-ui); font-size:10px; color:var(--muted); margin-bottom:10px; text-transform:uppercase; letter-spacing:0.1em; font-weight:600; }
input, textarea {
  width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--cream);
  padding:14px; font-size:14px; outline:none; transition:border-color 0.3s; font-family:var(--f-body);
  border-radius:8px;
}
input:focus, textarea:focus { border-color:var(--gold); background: #fff; }

.btn-save {
  padding:14px 32px; background:var(--gold); color:var(--bg); font-family:var(--f-ui); font-size:10px;
  letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border:none; margin-top:10px;
  transition: all 0.3s; border-radius:6px; font-weight:600;
}
.btn-save:hover { background: #5891ad; transform: translateY(-1px); }

.item-card {
  background:var(--bg2); border:1px solid var(--border); padding:32px; margin-bottom:32px; position:relative; border-radius:12px;
}
.btn-del {
  position:absolute; top:20px; right:20px; background:none; border:none; color:#ff4444; cursor:pointer; font-size:10px; text-transform:uppercase; opacity:0.6; font-family:var(--f-ui); font-weight:600; letter-spacing: 0.1em;
}
.btn-del:hover { opacity:1; }

.admin-tab { display:none; animation: fadeIn 0.4s ease; }
.admin-tab.active { display:block; }
@keyframes fadeIn { from{opacity:0; transform:translateY(10px)} to{opacity:1; transform:translateY(0)} }
</style>
</head>
<body>
  
  <aside class="sidebar">
    <a href="/" class="s-logo">SEO MUSICK</a>
    <ul class="s-nav">
      <li><a class="active" onclick="showTab('hero', this)">Hero</a></li>
      <li><a onclick="showTab('release', this)">최신 발매</a></li>
      <li><a onclick="showTab('works', this)">작품(Works)</a></li>
      <li><a onclick="showTab('activities', this)">활동(Activities)</a></li>
      <li><a onclick="showTab('about', this)">소개(About)</a></li>
      <li><a onclick="showTab('menu', this)">메뉴 관리</a></li>
    </ul>
  </aside>

  <main class="main">
    <div id="tab-hero" class="admin-tab active">
      <h1>Hero 섹션</h1>
      <div class="form-group">
        <label>인트로 문구 (Eye Catch)</label>
        <input type="text" id="hero-eye">
      </div>
      <div class="form-group">
        <label>메인 타이틀 (HTML 가능, &lt;br&gt; 및 &lt;em&gt; 사용)</label>
        <input type="text" id="hero-title">
      </div>
      <div class="form-group">
        <label>슬로건 (영어)</label>
        <input type="text" id="hero-slogan-en">
      </div>
      <div class="form-group">
        <label>슬로건 (한국어, &lt;br&gt; 가능)</label>
        <input type="text" id="hero-slogan-ko">
      </div>
      <div class="form-group">
        <label>유튜브 재생목록 ID (또는 전체 URL)</label>
        <div style="display:flex; gap:10px;">
          <input type="text" id="hero-youtube" placeholder="PLY9FRgvkLkmuVN3Udh3NiEnT3sAVjZR1v">
          <button class="btn-save" style="margin-top:0; padding:12px 20px; white-space:nowrap; background:var(--muted);" onclick="testYoutube()">연결 확인</button>
        </div>
        <p id="yt-test-msg" style="font-size:11px; margin-top:8px; color:var(--muted); font-family:var(--f-ui);"></p>
      </div>
      <button class="btn-save" onclick="saveHero()">Hero 저장</button>
    </div>

    <div id="tab-release" class="admin-tab">
      <h1>최신 발매 (Latest Release)</h1>
      <div class="form-group">
        <label>제목</label>
        <input type="text" id="rel-title">
      </div>
      <div class="form-group">
        <label>설명 (예: 2025.12.8 · Piano · Vocal)</label>
        <input type="text" id="rel-desc">
      </div>
      <div class="form-group">
        <label>감상 링크</label>
        <input type="text" id="rel-link">
      </div>
      <button class="btn-save" onclick="saveRelease()">최신 발매 저장</button>
    </div>

    <div id="tab-works" class="admin-tab">
      <h1>작품 목록 (Albums)</h1>
      <div id="works-list"></div>
      <div style="display:flex; gap:12px;">
        <button class="btn-save" onclick="addWork()">+ 새 앨범 추가</button>
        <button class="btn-save" style="background:var(--muted)" onclick="saveWorks()">모든 작품 저장</button>
      </div>
    </div>

    <div id="tab-activities" class="admin-tab">
      <h1>활동 목록 (Activities)</h1>
      <div id="activities-list"></div>
      <div style="display:flex; gap:12px;">
        <button class="btn-save" onclick="addActivity()">+ 새 활동 추가</button>
        <button class="btn-save" style="background:var(--muted)" onclick="saveActivities()">모든 활동 저장</button>
      </div>
    </div>

    <div id="tab-about" class="admin-tab">
      <h1>소개 섹션 (About)</h1>
      <div class="form-group">
        <label>말씀 구절 (HTML 가능)</label>
        <input type="text" id="about-verse">
      </div>
      <div class="form-group">
        <label>말씀 출처</label>
        <input type="text" id="about-ref">
      </div>
      <div class="form-group">
        <label>본문 내용 (줄바꿈으로 단락 구분)</label>
        <textarea id="about-body" rows="12"></textarea>
      </div>
      <button class="btn-save" onclick="saveAbout()">소개 저장</button>
    </div>

    <div id="tab-menu" class="admin-tab">
      <h1>네비게이션 메뉴 관리</h1>
      <div id="menu-list"></div>
      <div style="display:flex; gap:12px;">
        <button class="btn-save" onclick="addMenu()">+ 메뉴 항목 추가</button>
        <button class="btn-save" style="background:var(--muted)" onclick="saveMenu()">모든 메뉴 저장</button>
      </div>
    </div>
  </main>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script type="module" src="admin.js"></script>
  <script>
    function showTab(tab, el) {
      document.querySelectorAll('.admin-tab').forEach(t => t.classList.remove('active'));
      document.querySelectorAll('.s-nav a').forEach(a => a.classList.remove('active'));
      document.getElementById('tab-' + tab).classList.add('active');
      el.classList.add('active');
    }
    window.showTab = showTab;
  </script>
</body>
</html>
