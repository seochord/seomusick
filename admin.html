<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin — SEO MUSICK</title>
<link href="https://fonts.googleapis.com/css2?family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #fcfaf7;
  --cream: #1a1a18;
  --gold: #8d734a;
  --muted: #7a7268;
  --border: rgba(141,115,74,0.15);
}
body { background:var(--bg); color:var(--cream); font-family:'Lato',sans-serif; margin:0; padding:40px; }
h1 { color:var(--gold); letter-spacing:0.2em; text-transform:uppercase; font-size:24px; margin-bottom:40px; }
h2 { color:var(--gold); font-size:18px; margin-top:40px; border-bottom:1px solid var(--border); padding-bottom:10px; }
.form-group { margin-bottom:20px; }
label { display:block; font-size:12px; color:var(--muted); margin-bottom:8px; text-transform:uppercase; letter-spacing:0.1em; }
input, textarea {
  width:100%; background:var(--bg2); border:1px solid var(--border); color:var(--cream);
  padding:12px; font-size:14px; outline:none; transition:border-color 0.3s;
}
input:focus, textarea:focus { border-color:var(--gold); }
.btn-save {
  padding:12px 30px; background:var(--gold); color:var(--bg); font-size:12px;
  letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border:none; margin-top:20px;
}
.item-card {
  background:var(--bg2); border:1px solid var(--border); padding:20px; margin-bottom:20px; position:relative;
}
.btn-del {
  position:absolute; top:10px; right:10px; background:none; border:none; color:#ff4444; cursor:pointer; font-size:12px;
}
.nav-admin { margin-bottom:40px; display:flex; gap:20px; }
.nav-admin a { color:var(--muted); text-decoration:none; font-size:12px; text-transform:uppercase; letter-spacing:0.1em; }
.nav-admin a.active { color:var(--gold); border-bottom:1px solid var(--gold); }
</style>
</head>
<body>
  <h1>Admin Dashboard</h1>
  
  <nav class="nav-admin">
    <a href="#" class="active" onclick="showTab('hero')">Hero</a>
    <a href="#" onclick="showTab('works')">Works</a>
    <a href="#" onclick="showTab('blog')">Blog</a>
    <a href="#" onclick="showTab('about')">About</a>
  </nav>

  <div id="tab-hero" class="admin-tab">
    <h2>Hero Section</h2>
    <div class="form-group">
      <label>Eye Catch</label>
      <input type="text" id="hero-eye">
    </div>
    <div class="form-group">
      <label>Title (HTML allowed)</label>
      <input type="text" id="hero-title">
    </div>
    <button class="btn-save" onclick="saveHero()">Save Hero</button>
  </div>

  <div id="tab-works" class="admin-tab" style="display:none;">
    <h2>Works (Albums)</h2>
    <div id="works-list"></div>
    <button class="btn-save" onclick="addWork()">+ Add New Album</button>
    <button class="btn-save" style="background:var(--muted)" onclick="saveWorks()">Save All Works</button>
  </div>

  <div id="tab-blog" class="admin-tab" style="display:none;">
    <h2>Blog Posts</h2>
    <div id="blog-list"></div>
    <button class="btn-save" onclick="addBlog()">+ Add New Post</button>
    <button class="btn-save" style="background:var(--muted)" onclick="saveBlog()">Save All Posts</button>
  </div>

  <div id="tab-about" class="admin-tab" style="display:none;">
    <h2>About Section</h2>
    <div class="form-group">
      <label>Verse (HTML allowed)</label>
      <input type="text" id="about-verse">
    </div>
    <div class="form-group">
      <label>Verse Reference</label>
      <input type="text" id="about-ref">
    </div>
    <div class="form-group">
      <label>Body Content (One paragraph per line)</label>
      <textarea id="about-body" rows="10"></textarea>
    </div>
    <button class="btn-save" onclick="saveAbout()">Save About</button>
  </div>

  <script type="module" src="admin.js"></script>
  <script>
    function showTab(tab) {
      document.querySelectorAll('.admin-tab').forEach(t => t.style.display = 'none');
      document.querySelectorAll('.nav-admin a').forEach(a => a.classList.remove('active'));
      document.getElementById('tab-' + tab).style.display = 'block';
      event.target.classList.add('active');
    }
    window.showTab = showTab;
  </script>
</body>
</html>
