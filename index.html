<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="서의승 — Music of Faith For the Broken. 위로를 짓는 음악가의 공간.">
<title>SEO MUSICK — 서의승</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Noto+Serif+KR:wght@300;400;600&family=Lato:wght@300;400&family=EB+Garamond:ital,wght@0,400;0,500;1,400;1,500&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff;
  --bg2: #fcfaf7;
  --sw: 280px;
  --cream: #2a2a28; /* Deep Charcoal */
  --gold: #967d59;  /* Antique Gold */
  --gold-light: #b59a7a;
  --muted: #7a7268;
  --border: rgba(150,125,89,0.15);
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--cream); font-family:'Lato',sans-serif; display:flex; }

/* SIDEBAR */
.sidebar {
  width:var(--sw); min-width:var(--sw); height:100vh;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:48px 36px;
  position:fixed; left:0; top:0; z-index:10; overflow-y:auto;
}
.s-logo {
  font-family:'Cormorant Garamond',serif; font-size:22px; font-weight:600;
  letter-spacing:0.3em; color:var(--gold); cursor:pointer; margin-bottom:6px;
}
.s-sub { font-size:10px; letter-spacing:0.15em; color:var(--muted); margin-bottom:48px; }
.s-nav { list-style:none; flex:1; }
.s-nav li { margin-bottom:4px; }
.s-nav a {
  display:block; font-size:11px; letter-spacing:0.25em; text-transform:uppercase;
  color:var(--muted); text-decoration:none; padding:10px 14px;
  border-left:2px solid transparent;
  transition:color 0.3s, border-color 0.3s, padding-left 0.3s; cursor:pointer;
}
.s-nav a:hover { color:var(--cream); padding-left:20px; }
.s-nav a.active { color:var(--gold); border-left-color:var(--gold); padding-left:20px; }
.s-slogan { margin-top:auto; padding-top:36px; border-top:1px solid var(--border); }
.s-slogan span { display:block; font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--muted); line-height:2.2; }
.s-player { margin-top:24px; padding:16px; background:rgba(150,125,89,0.05); border:1px solid var(--border); }
.sp-label { font-size:8px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:8px; display:block; }
.sp-title { font-family:'Cormorant Garamond',serif; font-size:14px; color:var(--cream); margin-bottom:4px; }
.sp-desc { font-size:10px; color:var(--muted); margin-bottom:12px; }
.sp-wave { display:flex; gap:2px; align-items:center; margin-bottom:10px; }
.wb { width:2px; background:var(--gold); border-radius:2px; animation:wave 1.2s ease-in-out infinite; opacity:0.5; }
.wb:nth-child(1){height:6px;animation-delay:0s}
.wb:nth-child(2){height:12px;animation-delay:.15s}
.wb:nth-child(3){height:18px;animation-delay:.3s}
.wb:nth-child(4){height:10px;animation-delay:.45s}
.wb:nth-child(5){height:16px;animation-delay:.6s}
.wb:nth-child(6){height:8px;animation-delay:.75s}
.wb:nth-child(7){height:14px;animation-delay:.9s}
.sp-link { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); text-decoration:none; border-bottom:1px solid var(--border); padding-bottom:1px; }
.sp-link:hover { border-color:var(--gold); }

/* MAIN */
.main { margin-left:var(--sw); flex:1; height:100vh; overflow-y:auto; }

/* PAGES */
.page { display:none; min-height:100vh; animation:fadeIn 0.45s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }

/* HOME */
.hero {
  min-height:100vh; display:flex; flex-direction:column;
  justify-content:center; padding:80px; position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 70% 60% at 65% 40%, rgba(150,125,89,0.07) 0%, transparent 70%);
}
.h-eye { font-size:10px; letter-spacing:0.45em; text-transform:uppercase; color:var(--gold); margin-bottom:24px; opacity:0; animation:fadeUp 1s 0.2s forwards; }
.h-title { font-family:'Cormorant Garamond',serif; font-size:clamp(64px,8vw,120px); font-weight:300; line-height:0.95; letter-spacing:0.06em; color:var(--cream); margin-bottom:48px; opacity:0; animation:fadeUp 1s 0.4s forwards; }
.h-title em { font-style:italic; color:var(--gold); }

.h-brand { margin-bottom:56px; opacity:0; animation:fadeUp 1s 0.6s forwards; border-left:1px solid var(--border); padding-left:32px; }
.hb-en { font-family:'EB Garamond',serif; font-style:italic; font-size:clamp(22px,3vw,36px); color:var(--gold); margin-bottom:16px; letter-spacing:0.01em; font-weight:500; }
.hb-ko { font-family:'Noto Serif KR',serif; font-size:14px; font-weight:300; color:var(--muted); line-height:1.8; word-break:keep-all; }

.h-cta { display:flex; gap:14px; opacity:0; animation:fadeUp 1s 0.8s forwards; flex-wrap:wrap; }
.btn-p { padding:12px 30px; background:var(--gold); color:var(--bg); font-size:10px; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; border:none; transition:background 0.3s, transform 0.2s; display:inline-block; }
.btn-p:hover { background:var(--gold-light); transform:translateY(-2px); }
.btn-s { padding:12px 30px; border:1px solid var(--border); color:var(--cream); font-size:10px; letter-spacing:0.25em; text-transform:uppercase; cursor:pointer; background:none; transition:border-color 0.3s, color 0.3s, transform 0.2s; display:inline-block; }
.btn-s:hover { border-color:var(--gold); color:var(--gold); transform:translateY(-2px); }

/* PILLARS */
.h-pillars { display:flex; gap:1px; background:var(--border); margin-bottom:56px; opacity:0; animation:fadeUp 1s 0.7s forwards; width:fit-content; border:1px solid var(--border); }
.hp { background:var(--bg); padding:20px 32px; display:flex; flex-direction:column; gap:4px; }
.hp-en { font-size:9px; letter-spacing:0.3em; color:var(--gold); font-weight:400; }
.hp-ko { font-family:'Noto Serif KR',serif; font-size:12px; color:var(--muted); font-weight:300; }

/* PAGE INNER */
.pi { padding:80px; }
.p-header { margin-bottom:56px; padding-bottom:36px; border-bottom:1px solid var(--border); }
.p-eye { font-size:10px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); margin-bottom:14px; }
.p-title { font-family:'Cormorant Garamond',serif; font-size:clamp(40px,5vw,72px); font-weight:300; color:var(--cream); line-height:1; }

/* ALBUMS */
.album-item { display:grid; grid-template-columns:90px 1fr auto; gap:28px; padding:28px 0; border-bottom:1px solid var(--border); align-items:start; }
.album-item:hover { background:rgba(150,125,89,0.02); }
.a-year { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:300; color:rgba(150,125,89,0.45); line-height:1; }
.a-genre { display:inline-block; font-size:8px; letter-spacing:0.25em; text-transform:uppercase; color:var(--gold); border:1px solid var(--border); padding:2px 8px; margin-top:6px; }
.a-title { font-family:'Cormorant Garamond',serif; font-size:22px; color:var(--cream); margin-bottom:8px; line-height:1.2; }
.a-desc { font-family:'Noto Serif KR',serif; font-size:13px; line-height:1.8; color:var(--muted); font-weight:300; margin-bottom:6px; max-width:480px; }
.a-credit { font-size:10px; color:rgba(122,114,104,0.6); }
.a-link { font-size:9px; letter-spacing:0.2em; text-transform:uppercase; color:var(--gold); text-decoration:none; border-bottom:1px solid var(--border); padding-bottom:2px; white-space:nowrap; transition:border-color 0.3s; margin-top:4px; display:inline-block; }
.a-link:hover { border-color:var(--gold); }

/* SUB HEADER */
.sub-h { margin:56px 0 28px; padding-bottom:18px; border-bottom:1px solid var(--border); }
.sub-h h3 { font-family:'Cormorant Garamond',serif; font-size:30px; font-weight:300; color:var(--cream); }

/* ACTIVITY */
.act-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border); margin-bottom:80px; }
.act-item { background:var(--bg); padding:28px 24px; transition:background 0.3s; }
.act-item:hover { background:var(--bg2); }
.act-period { font-size:9px; letter-spacing:0.2em; color:var(--gold); margin-bottom:8px; }
.act-name { font-family:'Cormorant Garamond',serif; font-size:18px; color:var(--cream); margin-bottom:8px; }
.act-desc { font-family:'Noto Serif KR',serif; font-size:12px; line-height:1.7; color:var(--muted); font-weight:300; margin-bottom:10px; }
.act-award { display:inline-block; font-size:9px; color:var(--gold); border:1px solid var(--border); padding:3px 8px; }

/* BLOG */
.blog-frame-container {
  width:100%; height:90vh; overflow:hidden; border:1px solid var(--border);
  position:relative; background:var(--bg2);
}
.blog-frame {
  width:100%; height:calc(100% + 155px); border:none;
  margin-top:-155px; /* Offset to hide Tistory header */
}
.bi { background:var(--bg); padding:32px 28px; transition:background 0.3s; text-decoration:none; display:block; }
.bi:hover { background:var(--bg2); }
.bi-tag { font-size:8px; letter-spacing:0.3em; text-transform:uppercase; color:var(--gold); margin-bottom:12px; }
.bi-title { font-family:'Noto Serif KR',serif; font-size:15px; font-weight:400; color:var(--cream); line-height:1.6; margin-bottom:14px; }
.bi-date { font-size:10px; color:var(--muted); }

/* ABOUT */
.about-image { margin-bottom:52px; max-width:560px; }
.about-image img { width:100%; height:auto; display:block; border:1px solid var(--border); }
.about-verse { margin-bottom:52px; padding:36px; border:1px solid var(--border); background:rgba(150,125,89,0.03); max-width:560px; }
.v-text { font-family:'Cormorant Garamond',serif; font-size:20px; font-style:italic; font-weight:300; color:var(--cream); line-height:1.6; margin-bottom:10px; }
.v-ref { font-size:10px; letter-spacing:0.2em; color:var(--gold); }
.about-id { display:flex; gap:16px; margin-bottom:52px; flex-wrap:wrap; }
.id-item { display:flex; gap:10px; align-items:center; padding:14px 20px; border:1px solid var(--border); transition:background 0.3s; }
.id-item:hover { background:rgba(150,125,89,0.05); }
.id-icon { font-size:16px; }
.id-label { font-size:10px; letter-spacing:0.25em; text-transform:uppercase; color:var(--muted); }
.about-body { max-width:600px; margin-bottom:52px; }
.about-body p { font-family:'Noto Serif KR',serif; font-size:15px; line-height:2.1; color:var(--muted); font-weight:300; margin-bottom:24px; }
.about-close { padding-top:36px; border-top:1px solid var(--border); }
.close-text { font-family:'Cormorant Garamond',serif; font-size:30px; font-style:italic; font-weight:300; color:var(--gold); }

/* ANIMATIONS */
@keyframes fadeUp { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:translateY(0)} }
@keyframes wave { 0%,100%{transform:scaleY(1);opacity:.5} 50%{transform:scaleY(.4);opacity:1} }

/* MOBILE */
.mob-header { display:none; position:fixed; top:0; left:0; right:0; z-index:20; background:rgba(255,255,255,0.97); border-bottom:1px solid var(--border); padding:14px 20px; justify-content:space-between; align-items:center; }
.mob-logo { font-family:'Cormorant Garamond',serif; font-size:18px; font-weight:600; letter-spacing:0.3em; color:var(--gold); cursor:pointer; }
.mob-toggle { background:none; border:none; color:var(--cream); font-size:22px; cursor:pointer; }

@media(max-width:768px){
  html,body{overflow:auto}
  .sidebar { transform:translateX(-100%); transition:transform 0.3s ease; width:260px; min-width:260px; z-index:15; top:52px; padding:28px 24px; }
  .sidebar.open { transform:translateX(0); }
  .main { margin-left:0; height:auto; overflow-y:auto; padding-top:52px; }
  .mob-header { display:flex; }
  .pi { padding:40px 24px; }
  .hero { padding:40px 24px; min-height:auto; padding-top:60px; }
  .h-pillars { flex-direction:column; gap:1px; }
  .hp { border-right:1px solid var(--border); }
  .album-item { grid-template-columns:60px 1fr; gap:16px; }
  .a-link { display:none; }
  .act-grid { grid-template-columns:1fr; }
  .blog-grid { grid-template-columns:1fr; }
  .about-id { gap:10px; }
}
</style>
</head>
<body>

<!-- MOBILE HEADER -->
<div class="mob-header">
  <span class="mob-logo" onclick="go('home')">SEO MUSICK</span>
  <button class="mob-toggle" onclick="toggleSide()">☰</button>
</div>

<!-- SIDEBAR -->
<aside class="sidebar" id="sidebar">
  <span class="s-logo" onclick="go('home')">SEO MUSICK</span>
  <p class="s-sub">서의승 · Seo Euy-seung</p>
  <ul class="s-nav">
    <li><a onclick="go('home')" class="active" id="nav-home">Home</a></li>
    <li><a onclick="go('works')" id="nav-works">Works</a></li>
    <li><a onclick="go('blog')" id="nav-blog">Blog</a></li>
    <li style="border-bottom:1px solid var(--border); padding-bottom:10px; margin-bottom:10px;">
      <a onclick="go('about')" id="nav-about">About</a>
    </li>
  </ul>
  <div class="s-player">
    <span class="sp-label">Latest Release</span>
    <div class="sp-title">겨울편지</div>
    <div class="sp-desc">2025.12.8 · Piano · Vocal</div>
    <div class="sp-wave">
      <div class="wb"></div><div class="wb"></div><div class="wb"></div>
      <div class="wb"></div><div class="wb"></div><div class="wb"></div><div class="wb"></div>
    </div>
    <a href="https://www.submithub.com/link/letter-from-winter" class="sp-link" target="_blank">Listen →</a>
  </div>
</aside>

<!-- MAIN -->
<main class="main" id="main">

  <!-- HOME -->
  <section class="page active" id="page-home">
    <div class="hero">
      <!-- Content rendered by main.js -->
    </div>
  </section>

  <!-- WORKS -->
  <section class="page" id="page-works">
    <div class="pi">
      <!-- Content rendered by main.js -->
    </div>
  </section>

  <!-- BLOG -->
  <section class="page" id="page-blog">
    <div class="pi">
      <!-- Content rendered by main.js -->
    </div>
  </section>

  <!-- ABOUT -->
  <section class="page" id="page-about">
    <div class="pi">
      <!-- Content rendered by main.js -->
    </div>
  </section>

</main>

<script type="module" src="main.js?v=1.1"></script>
</body>
</html>
