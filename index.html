<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="description" content="서의승 — Music of Faith For the Broken. 위로를 짓는 음악가의 공간.">
<title>SEO MUSICK — 서의승</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Nanum+Myeongjo:wght@400;700&family=Lora:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #ffffff; 
  --bg2: #fcfaf7; 
  --sw: 280px;
  --cream: #1a1a18; 
  --gold: #8d734a;  
  --gold-light: #b59a7a;
  --muted: #7a7268;
  --border: rgba(141,115,74,0.15);
  
  /* MODERN CLASSIC FONTS */
  --f-head: 'Playfair Display', serif;
  --f-body: 'Nanum Myeongjo', serif;
  --f-ui: 'Lora', serif;
}
* { margin:0; padding:0; box-sizing:border-box; }
html,body { height:100%; overflow:hidden; }
body { background:var(--bg); color:var(--cream); font-family:var(--f-body); display:flex; line-height:1.8; }

/* SIDEBAR */
.sidebar {
  width:var(--sw); min-width:var(--sw); height:100vh;
  background:var(--bg2); border-right:1px solid var(--border);
  display:flex; flex-direction:column; padding:52px 40px;
  position:fixed; left:0; top:0; z-index:10; overflow-y:auto;
}
.s-logo {
  font-family:var(--f-head); font-size:26px; font-weight:700;
  letter-spacing:0.12em; color:var(--gold); cursor:pointer; margin-bottom:8px;
  transition: opacity 0.3s;
}
.s-logo:hover { opacity: 0.8; }
.s-sub { font-family:var(--f-ui); font-size:10px; letter-spacing:0.1em; color:var(--muted); margin-bottom:48px; font-style: italic; }
.s-nav { list-style:none; margin-bottom:32px; }
.s-nav li { margin-bottom:6px; }
.s-nav a {
  display:block; font-family:var(--f-ui); font-size:11px; letter-spacing:0.15em; text-transform:uppercase;
  color:var(--muted); text-decoration:none; padding:12px 14px;
  border-left:1px solid transparent; font-weight:400;
  transition:all 0.3s; cursor:pointer;
}
.s-nav a:hover { color:var(--cream); padding-left:20px; }
.s-nav a.active { color:var(--gold); border-left-color:var(--gold); padding-left:20px; font-weight:500; }

/* SOCIAL */
.s-social { display:flex; gap:18px; padding:0 14px; margin-bottom:32px; }
.s-social a { color:var(--muted); transition:color 0.3s, transform 0.3s; display:flex; align-items:center; justify-content:center; }
.s-social a:hover { color:var(--gold); transform:translateY(-2px); }
.s-social svg { width:18px; height:18px; fill:currentColor; }

.s-player { margin-top:24px; padding:20px; background:rgba(141,115,74,0.03); border:1px solid var(--border); border-radius:12px; }
.sp-label { font-family:var(--f-ui); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); margin-bottom:10px; display:block; font-weight:600; }
.sp-title { font-family:var(--f-head); font-size:16px; color:var(--cream); margin-bottom:6px; font-weight: 600; }
.sp-desc { font-family:var(--f-body); font-size:11px; color:var(--muted); margin-bottom:14px; }
.sp-wave { display:flex; gap:3px; align-items:center; margin-bottom:12px; }
.wb { width:2px; background:var(--gold); border-radius:2px; animation:wave 1.2s ease-in-out infinite; opacity:0.5; }
.wb:nth-child(1){height:6px;animation-delay:0s}
.wb:nth-child(2){height:12px;animation-delay:.15s}
.wb:nth-child(3){height:18px;animation-delay:.3s}
.wb:nth-child(4){height:10px;animation-delay:.45s}
.wb:nth-child(5){height:16px;animation-delay:.6s}
.wb:nth-child(6){height:8px;animation-delay:.75s}
.wb:nth-child(7){height:14px;animation-delay:.9s}
.sp-link { font-family:var(--f-ui); font-size:10px; letter-spacing:0.1em; text-transform:uppercase; color:var(--gold); text-decoration:none; border-bottom:1px solid var(--border); padding-bottom:1px; font-weight:500; }
.sp-link:hover { border-color:var(--gold); }

/* MAIN */
.main { margin-left:var(--sw); flex:1; height:100vh; overflow-y:auto; }

/* PAGES */
.page { display:none; min-height:100vh; animation:fadeIn 0.5s ease; }
.page.active { display:block; }
@keyframes fadeIn { from{opacity:0;transform:translateY(15px)} to{opacity:1;transform:translateY(0)} }

/* HOME */
.hero {
  min-height:100vh; display:flex; flex-direction:column;
  justify-content:center; padding:100px; position:relative; overflow:hidden;
}
.hero::before {
  content:''; position:absolute; inset:0; pointer-events:none;
  background: radial-gradient(ellipse 70% 60% at 65% 40%, rgba(141,115,74,0.07) 0%, transparent 70%);
}
.h-eye { font-family:var(--f-ui); font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); margin-bottom:28px; opacity:0; animation:fadeUp 1s 0.2s forwards; font-weight:500; }
.h-title { font-family:var(--f-head); font-size:clamp(40px,6vw,84px); font-weight:700; line-height:1.15; letter-spacing:0.01em; color:var(--cream); margin-bottom:48px; opacity:0; animation:fadeUp 1s 0.4s forwards; max-width: 900px; }
.h-title em { font-style:italic; color:var(--gold); font-family: var(--f-head); font-weight: 400; }

.h-brand { margin-bottom:60px; opacity:0; animation:fadeUp 1s 0.6s forwards; }
.hb-en { 
  font-family:var(--f-head); font-style:italic; font-size:12px; color:var(--gold); 
  margin-bottom:16px; letter-spacing:0.25em; font-weight:400; text-transform: uppercase;
  opacity: 0.75;
}
.hb-ko { 
  font-family:var(--f-body); font-size:13px; color:var(--muted); 
  line-height:2.2; word-break:keep-all; letter-spacing: 0.08em;
  font-weight: 400;
}

.h-cta { display:flex; gap:18px; opacity:0; animation:fadeUp 1s 0.8s forwards; flex-wrap:wrap; }
.btn-p { font-family:var(--f-ui); padding:14px 36px; background:var(--gold); color:var(--bg); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; border:none; transition:all 0.3s; display:inline-block; font-weight:500; border-radius:4px; }
.btn-p:hover { background:var(--gold-light); transform:translateY(-2px); }
.btn-s { font-family:var(--f-ui); padding:14px 36px; border:1px solid var(--border); color:var(--cream); font-size:11px; letter-spacing:0.2em; text-transform:uppercase; cursor:pointer; background:none; transition:all 0.3s; display:inline-block; font-weight:500; border-radius:4px; }
.btn-s:hover { border-color:var(--gold); color:var(--gold); transform:translateY(-2px); }

/* PILLARS */
.h-pillars { display:flex; gap:1px; background:var(--border); margin-bottom:60px; opacity:0; animation:fadeUp 1s 0.7s forwards; width:fit-content; border:1px solid var(--border); }
.hp { background:var(--bg); padding:24px 36px; display:flex; flex-direction:column; gap:6px; }
.hp-en { font-family: var(--f-head); font-size:11px; letter-spacing:0.25em; color:var(--gold); font-weight:600; }
.hp-ko { font-family:var(--f-body); font-size:14px; color:var(--muted); }

/* PAGE INNER */
.pi { padding:100px; }
.p-header { margin-bottom:60px; padding-bottom:40px; border-bottom:1px solid var(--border); }
.p-eye { font-family:var(--f-ui); font-size:11px; letter-spacing:0.4em; text-transform:uppercase; color:var(--gold); margin-bottom:16px; font-weight:500; }
.p-title { font-family:var(--f-head); font-size:clamp(44px,6vw,84px); font-weight:700; color:var(--cream); line-height:1.1; letter-spacing:0.02em; }

/* ALBUMS */
.album-item { display:grid; grid-template-columns:100px 1fr auto; gap:32px; padding:32px 0; border-bottom:1px solid var(--border); align-items:start; }
.album-item:hover { background:rgba(141,115,74,0.02); }
.a-year { font-family:var(--f-head); font-size:36px; font-weight:600; color:rgba(141,115,74,0.3); line-height:1; }
.a-genre { display:inline-block; font-family:var(--f-ui); font-size:9px; letter-spacing:0.15em; text-transform:uppercase; color:var(--gold); border:1px solid var(--border); padding:4px 12px; margin-top:8px; font-weight:500; border-radius:4px; }
.a-title { font-family:var(--f-head); font-size:26px; color:var(--cream); margin-bottom:10px; line-height:1.2; font-weight: 600; }
.a-desc { font-family:var(--f-body); font-size:15px; line-height:1.9; color:var(--muted); margin-bottom:8px; max-width:520px; }
.a-credit { font-family:var(--f-body); font-size:12px; color:rgba(122,114,104,0.6); font-style: italic; }
.a-link { font-family:var(--f-ui); font-size:10px; letter-spacing:0.12em; text-transform:uppercase; color:var(--gold); text-decoration:none; border-bottom:1px solid var(--border); padding-bottom:2px; white-space:nowrap; transition:all 0.3s; margin-top:6px; display:inline-block; font-weight:500; }
.a-link:hover { border-color:var(--gold); }

/* SUB HEADER */
.sub-h { margin:64px 0 32px; padding-bottom:20px; border-bottom:1px solid var(--border); }
.sub-h h3 { font-family:var(--f-head); font-size:36px; font-weight:600; color:var(--cream); }

/* ACTIVITY */
.act-grid { display:grid; grid-template-columns:repeat(2,1fr); gap:1px; background:var(--border); margin-bottom:80px; }
.act-item { background:var(--bg); padding:32px 28px; transition:background 0.3s; }
.act-item:hover { background:var(--bg2); }
.act-period { font-family:var(--f-ui); font-size:10px; letter-spacing:0.12em; color:var(--gold); margin-bottom:10px; font-weight:500; }
.act-name { font-family:var(--f-head); font-size:22px; color:var(--cream); margin-bottom:10px; font-weight: 600; }
.act-desc { font-family:var(--f-body); font-size:14px; line-height:1.8; color:var(--muted); margin-bottom:12px; }
.act-award { display:inline-block; font-family:var(--f-ui); font-size:10px; color:var(--gold); border:1px solid var(--border); padding:4px 12px; border-radius:4px; font-weight:500; }

/* ABOUT */
.about-image { margin-bottom:60px; max-width:600px; }
.about-image img { width:100%; height:auto; display:block; border:1px solid var(--border); border-radius:12px; }
.about-verse { margin-bottom:60px; padding:48px; border:1px solid var(--border); background:rgba(141,115,74,0.03); max-width:600px; border-radius:12px; }
.v-text { font-family:var(--f-head); font-size:26px; font-style:italic; font-weight:400; color:var(--cream); line-height:1.7; margin-bottom:14px; }
.v-ref { font-family:var(--f-ui); font-size:11px; letter-spacing:0.15em; color:var(--gold); font-weight:500; text-transform: uppercase; }
.about-id { display:flex; gap:16px; margin-bottom:60px; flex-wrap:wrap; }
.id-item { display:flex; gap:12px; align-items:center; padding:16px 24px; border:1px solid var(--border); transition:all 0.3s; border-radius:8px; }
.id-item:hover { background:rgba(141,115,74,0.05); }
.id-icon { font-size:18px; }
.id-label { font-family:var(--f-ui); font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--muted); font-weight:500; }
.about-body { max-width:640px; margin-bottom:60px; }
.about-body p { font-family:var(--f-body); font-size:17px; line-height:2.2; color:var(--muted); margin-bottom:32px; text-align: justify; }
.about-close { padding-top:40px; border-top:1px solid var(--border); }
.close-text { font-family:var(--f-head); font-size:36px; font-style:italic; font-weight:400; color:var(--gold); }

/* BLOG */
.blog-frame-container {
  width: 100%;
  height: calc(100vh - 380px); /* Adjust based on header and padding */
  min-height: 600px;
  background: #fcfaf7;
  border-radius: 12px;
  overflow: hidden;
  border: 1px solid var(--border);
  box-shadow: 0 10px 40px rgba(141,115,74,0.08);
}
.blog-frame {
  width: 100%;
  height: 100%;
  border: none;
  display: block;
}

/* ANIMATIONS */
@keyframes fadeUp { from{opacity:0;transform:translateY(25px)} to{opacity:1;transform:translateY(0)} }
@keyframes wave { 0%,100%{transform:scaleY(1);opacity:.5} 50%{transform:scaleY(.4);opacity:1} }

/* MOBILE */
.mob-header { display:none; position:fixed; top:0; left:0; right:0; z-index:20; background:rgba(255,255,255,0.97); border-bottom:1px solid var(--border); padding:16px 24px; justify-content:space-between; align-items:center; }
.mob-logo { font-family:var(--f-head); font-size:22px; font-weight:700; letter-spacing:0.12em; color:var(--gold); cursor:pointer; }
.mob-toggle { background:none; border:none; color:var(--cream); font-size:24px; cursor:pointer; }

@media(max-width:768px){
  html,body{overflow:auto}
  .sidebar { transform:translateX(-100%); transition:transform 0.4s ease; width:280px; min-width:280px; z-index:15; top:56px; padding:32px 24px; height: calc(100vh - 56px); }
  .sidebar.open { transform:translateX(0); }
  .sidebar .s-logo { display: none; }
  .sidebar .s-sub { margin-top: 0; margin-bottom: 32px; }
  .main { margin-left:0; height:auto; overflow-y:auto; padding-top:56px; }
  .mob-header { display:flex; }
  .pi { padding:48px 24px; }
  .hero { padding:80px 24px; min-height:auto; }
  .h-title { font-size: 38px; margin-bottom: 32px; }
  .hb-ko { font-size: 18px; }
  .h-pillars { flex-direction:column; gap:1px; }
  .hp { border-right:1px solid var(--border); }
  .album-item { grid-template-columns:80px 1fr; gap:20px; }
  .a-link { display:none; }
  .act-grid { grid-template-columns:1fr; }
  .about-id { gap:12px; }
}
</style>
</head>
<body>

<aside class="sidebar" id="sidebar">

  <ul class="s-nav" id="main-nav">
